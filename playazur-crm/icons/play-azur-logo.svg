<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f7fc"/>
    </linearGradient>
    <linearGradient id="triangle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3FA0FF"/>
      <stop offset="100%" stop-color="#1B6FFF"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB627"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="64"/>

  <!-- Triangle "play" rotated 90deg (pointing right) with orange border -->
  <g transform="translate(256,256)">
    <!-- Outer orange border triangle -->
    <path d="M -150,-160 L 175,0 L -150,160 Z"
          fill="none"
          stroke="url(#border)"
          stroke-width="22"
          stroke-linejoin="round"/>
    <!-- Inner blue triangle -->
    <path d="M -140,-150 L 165,0 L -140,150 Z"
          fill="url(#triangle)"
          stroke="none"/>
    <!-- Subtle palm silhouettes (decorative) -->
    <g opacity="0.18" fill="#0b3a8a">
      <path d="M -90,90 Q -100,40 -75,30 Q -85,50 -78,90 Z"/>
      <path d="M -55,95 Q -65,55 -45,45 Q -55,65 -50,95 Z"/>
    </g>
    <!-- PLAY text -->
    <text x="-90" y="-15"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-weight="800"
          font-size="62"
          fill="#ffffff"
          letter-spacing="2">PL</text>
    <!-- Play triangle marker (between PL and Y) -->
    <path d="M -22,-34 L 8,-19 L -22,-4 Z" fill="#FFB627"/>
    <text x="14" y="-15"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-weight="800"
          font-size="62"
          fill="#ffffff"
          letter-spacing="2">Y</text>
    <!-- AZUR text -->
    <text x="-90" y="55"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-weight="700"
          font-size="58"
          fill="#ffffff"
          letter-spacing="6">AZUR</text>
    <!-- FESTIVAL text (vertical, right side) -->
    <text x="115" y="20"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-weight="600"
          font-size="15"
          fill="#ffffff"
          letter-spacing="3"
          transform="rotate(90 115 20)">FESTIVAL</text>
  </g>
</svg>
