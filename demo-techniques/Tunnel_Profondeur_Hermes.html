<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HERMÈS · PERPÉTUELLE — Tunnel en profondeur</title>
<style>
  :root{ --cream:#f3ece0; --dim:#cdc4b4; --bleu:#8FC0DD; --or:#caa15a; --noir:#06080b; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;overflow-x:hidden;background:var(--noir)}
  body{color:var(--cream);font-family:Inter,system-ui,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .serif{font-family:Georgia,'Times New Roman',serif}
  html.lenis,html.lenis body{height:auto}
  .lenis.lenis-smooth{scroll-behavior:auto !important}

  /* scène en perspective (le tunnel) */
  #tunnel{position:fixed;inset:0;z-index:0;overflow:hidden;
          perspective:1100px;perspective-origin:50% 50%;
          background:radial-gradient(ellipse at 50% 50%,rgba(40,60,80,.22),rgba(6,8,11,1) 62%)}
  #world{position:absolute;inset:0;transform-style:preserve-3d;will-change:transform}
  /* halo "bout du tunnel" + vignette */
  #vig{position:fixed;inset:0;z-index:2;pointer-events:none;
       background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(6,8,11,.55) 100%)}

  .ring{position:absolute;left:50%;top:50%;width:66vw;height:66vh;margin:-33vh 0 0 -33vw;
        border:1px solid rgba(143,192,221,.5);border-radius:22px;box-shadow:0 0 40px rgba(143,192,221,.06) inset;will-change:opacity}
  .item{position:absolute;left:50%;top:50%;will-change:opacity;backface-visibility:hidden}

  .kicker{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--bleu);margin-bottom:12px}
  .title{font-family:Georgia,serif;font-weight:400;font-size:clamp(40px,7vw,96px);line-height:1.0;letter-spacing:-.02em;text-shadow:0 6px 50px #000}
  .title em{font-style:italic;color:var(--or)}
  .h2{font-family:Georgia,serif;font-weight:400;font-size:clamp(26px,4vw,48px);line-height:1.08;text-shadow:0 4px 30px #000}
  .sub{margin:18px auto 0;max-width:560px;font-size:clamp(14px,1.7vw,18px);line-height:1.6;color:var(--cream);text-shadow:0 2px 18px #000}
  .center{text-align:center}

  .card{background:rgba(10,13,18,.66);backdrop-filter:blur(5px);border:1px solid rgba(243,236,224,.18);border-radius:14px;padding:20px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.45)}
  .card .num{display:block;font-family:Georgia,serif;font-size:44px;color:var(--cream)}
  .card .num small{font-size:17px;color:var(--bleu)}
  .card span{display:block;margin-top:7px;font-size:14px;color:var(--dim);line-height:1.4}
  .card i{font-family:Georgia,serif;font-style:normal;font-size:26px;color:var(--or)}
  .card b{display:block;margin:8px 0 6px;font-size:19px}
  .card p{font-size:14px;line-height:1.45;color:var(--dim)}
  .card.hi{border-color:rgba(143,192,221,.42)} .card.hi .num{color:var(--bleu)}

  .panel{background:rgba(10,13,18,.6);backdrop-filter:blur(5px);border:1px solid rgba(243,236,224,.16);border-radius:16px;padding:22px;text-align:left;box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .panel h3{font-family:Georgia,serif;font-weight:400;font-size:24px;margin-bottom:12px}
  .mini{list-style:none;display:flex;flex-direction:column;gap:8px}
  .mini li{position:relative;padding-left:18px;font-size:13px;color:var(--cream);line-height:1.4}
  .mini li::before{content:"";position:absolute;left:0;top:7px;width:7px;height:7px;border-radius:50%;background:var(--or)}

  .pl{background:linear-gradient(160deg,rgba(143,192,221,.14),rgba(10,13,18,.5));border:1px solid rgba(243,236,224,.18);border-radius:16px;padding:20px;text-align:left;box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .pl .rn{font-family:Georgia,serif;font-size:28px;color:var(--or)}
  .pl b{display:block;margin:8px 0 6px;font-size:16px}
  .pl p{font-size:12px;line-height:1.5;color:var(--dim)}

  .imgcard{border-radius:16px;overflow:hidden;border:1px solid rgba(243,236,224,.2);box-shadow:0 30px 70px rgba(0,0,0,.55);position:relative}
  .imgcard img{display:block;width:100%;filter:brightness(.72) saturate(1.05)}
  .imlbl{position:absolute;left:0;right:0;bottom:16px;text-align:center;font-family:Georgia,serif;letter-spacing:.18em;font-size:15px;color:#fff;text-shadow:0 2px 14px #000}

  .bars{display:flex;flex-direction:column;gap:13px;margin-top:18px;text-align:left}
  .br b{font-family:Georgia,serif;font-size:13px} .br .tk{margin-top:6px;height:26px;border-radius:7px;background:rgba(255,255,255,.08);overflow:hidden}
  .br .fl{height:100%;border-radius:7px;display:flex;align-items:center;justify-content:flex-end;padding:0 11px;font-size:12px;font-weight:600;color:#0b0d10}

  .quote{font-family:Georgia,serif;font-style:italic;font-size:clamp(24px,3.4vw,40px);line-height:1.3;text-shadow:0 3px 26px #000}
  .quote cite{display:block;margin-top:14px;font-style:normal;font-size:12px;letter-spacing:.25em;color:var(--bleu)}

  /* UI */
  #bar{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--bleu),var(--or));z-index:30}
  nav{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;
      padding:18px clamp(16px,4vw,44px);font-size:11px;letter-spacing:.24em;text-transform:uppercase;mix-blend-mode:difference}
  nav .b{font-weight:700}
  .hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:20;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:8px}
  .hint i{width:1px;height:34px;background:linear-gradient(var(--bleu),transparent);animation:h 1.8s ease-in-out infinite}
  @keyframes h{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}50.1%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
  #scroller{position:relative;z-index:5;pointer-events:none}
  @media (prefers-reduced-motion: reduce){ .hint i{animation:none} }
</style>
</head>
<body>
  <div id="tunnel"><div id="world"></div></div>
  <div id="vig"></div>
  <div id="bar"></div>
  <nav><span>HERMÈS</span><span class="b">PERPÉTUELLE</span><span>2026</span></nav>
  <div class="hint">avancer<i></i></div>
  <div id="scroller"></div>

      {x:'-36vw',y:'-6vh',z:-18200,w:'150px',c:'card',h:`<i>1</i><b>Dépôt</b><p>Remise gantée.</p>`},
      {x:'-12vw',y:'26vh',z:-18350,w:'150px',c:'card',h:`<i>2</i><b>Authentification</b><p>Du fermoir au point sellier.</p>`},
      {x:'14vw',y:'-26vh',z:-18500,w:'150px',c:'card',h:`<i>3</i><b>Restauration</b><p>Cuir & patine.</p>`},
      {x:'36vw',y:'4vh',z:-18650,w:'150px',c:'card',h:`<i>4</i><b>Certification</b><p>Passeport Hermès.</p>`},
      {x:'-30vw',y:'28vh',z:-18800,w:'150px',c:'card',h:`<i>5</i><b>Revente</b><p>Au juste prix.</p>`},
      {x:'30vw',y:'27vh',z:-18950,w:'150px',c:'card',h:`<i>6</i><b>Nouvelle vie</b><p>Repart ou renaît.</p>`},

      {x:'0',y:'-30vh',z:-20300,w:'460px',c:'center',h:`<div class="kicker">Le pilotage</div><h2 class="h2">Indicateurs de succès</h2>`},
      {x:'-34vw',y:'0',z:-20500,w:'185px',c:'card hi',h:`<b class="num">95<small> %</small></b><span>Rachat accepté (authentification)</span>`},
      {x:'34vw',y:'-6vh',z:-20700,w:'185px',c:'card hi',h:`<b class="num">21<small> j</small></b><span>Délai moyen de restauration</span>`},
      {x:'-30vw',y:'25vh',z:-20900,w:'185px',c:'card hi',h:`<b class="num">100<small> %</small></b><span>Upcycling sans comparable de prix</span>`},
      {x:'32vw',y:'26vh',z:-21100,w:'185px',c:'card hi',h:`<b class="num">0<small></small></b><span>Fuite du statut — confidentialité</span>`},

      {x:'0',y:'0',z:-22600,w:'min(820px,88vw)',c:'center',h:`<p class="quote">« La valeur ne se perd pas.<br/>Elle se transmet. »<cite>HERMÈS · PERPÉTUELLE</cite></p>`},
    ];

    const world = document.getElementById('world');
    const MINZ = Math.min.apply(null, ITEMS.map(o=>o.z));   // le plus profond
    const MAXZ = -MINZ + 1400;                              // distance totale à parcourir

    // anneaux du tunnel
    const rings = [];
    for (let i=0;i<22;i++){
      const z = -i*1000 - 500;
      const r = document.createElement('div'); r.className='ring';
      r.style.transform = `translateZ(${z}px)`;
      r.dataset.z = z; world.appendChild(r); rings.push(r);
    }
    // éléments de contenu
    const nodes = ITEMS.map(o=>{
      const el = document.createElement('div'); el.className = 'item ' + (o.c||'');
      el.style.width = o.w; el.innerHTML = o.h;
      el.style.transform = `translate(-50%,-50%) translate3d(${o.x},${o.y},${o.z}px)`;
      el.dataset.z = o.z; world.appendChild(el); return el;
    });

    /* Lenis : scroll -> progression */
    let progress = 0, velocity = 0;
    document.getElementById('scroller').style.height = Math.round(MAXZ/9) + 'vh';
    const lenis = new Lenis({ duration:1.25, smoothWheel:!reduce });
    lenis.on('scroll', (e)=>{ progress = e.progress||0; velocity = e.velocity||0; });
    function rafL(t){ lenis.raf(t); requestAnimationFrame(rafL); }
    requestAnimationFrame(rafL);

    const bar = document.getElementById('bar');
    function visItem(sz){
      const inn = (sz + 1800)/800;     // apparaît depuis la profondeur
      const out = (-160 - sz)/340;     // plein au point focal, puis s'efface en nous dépassant
      return Math.max(0, Math.min(1, Math.min(inn, out)));
    }
    function visRing(sz){
      const inn = (sz + 13000)/5000, out = (-60 - sz)/520;
      return Math.max(0, Math.min(0.6, Math.min(inn, out)));
    }

    let camZ = 0, last = performance.now();
    function loop(now){
      const dt = Math.min(0.05,(now-last)/1000); last = now;
      const target = progress * MAXZ;
      camZ += (target - camZ) * Math.min(1, dt*5);
      world.style.transform = `translateZ(${camZ}px)`;       // on AVANCE dans le tunnel
      for (let i=0;i<nodes.length;i++){
        const sz = (+nodes[i].dataset.z) + camZ;             // profondeur écran de l'élément
        nodes[i].style.opacity = visItem(sz).toFixed(3);
      }
      for (let i=0;i<rings.length;i++){
        rings[i].style.opacity = visRing((+rings[i].dataset.z) + camZ).toFixed(3);
      }
      bar.style.width = (progress*100) + '%';
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
