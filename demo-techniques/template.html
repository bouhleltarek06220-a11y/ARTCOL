<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Profondeur — démo scroll en Z (on entre dans la page)</title>
<style>
  :root{ --cream:#f3ece0; --dim:#cfc6b6; --bleu:#8FC0DD; --noir:#0b0d10; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;overflow-x:hidden}
  body{background:var(--noir);color:var(--cream);font-family:Inter,system-ui,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .serif{font-family:Georgia,'Times New Roman',serif}

  /* CSS requis par Lenis */
  html.lenis, html.lenis body{height:auto}
  .lenis.lenis-smooth{scroll-behavior:auto !important}
  .lenis.lenis-stopped{overflow:hidden}

  #gl{position:fixed;inset:0;z-index:0;display:block}
  /* vignette pour la profondeur + lisibilité */
  #vig{position:fixed;inset:0;z-index:1;pointer-events:none;
       background:radial-gradient(ellipse at 50% 50%,transparent 38%,rgba(7,9,12,.55) 100%)}
  #bar{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--bleu),#fff);z-index:30}

  nav{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;
      padding:20px clamp(16px,4vw,44px);font-size:11px;letter-spacing:.22em;text-transform:uppercase;mix-blend-mode:difference}
  nav .b{font-weight:700}

  /* titres : superposés au centre, pilotés en opacité par la profondeur */
  #titles{position:fixed;inset:0;z-index:10;pointer-events:none}
  .t{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px;opacity:0;will-change:opacity,transform}
  .kicker{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--bleu);margin-bottom:18px}
  .title{font-family:Georgia,serif;font-weight:400;font-size:clamp(46px,8.5vw,112px);line-height:.98;letter-spacing:-.02em;text-shadow:0 6px 50px rgba(0,0,0,.8)}
  .sub{margin-top:22px;max-width:520px;font-size:clamp(15px,1.8vw,19px);line-height:1.6;color:var(--cream);text-shadow:0 2px 22px rgba(0,0,0,.95)}

  .hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:20;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:9px}
  .hint i{width:1px;height:40px;background:linear-gradient(var(--bleu),transparent);animation:h 1.8s ease-in-out infinite}
  @keyframes h{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}50.1%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

  #learn{position:fixed;left:22px;bottom:22px;z-index:25;max-width:320px;background:rgba(12,15,20,.82);backdrop-filter:blur(10px);
         border:1px solid rgba(143,192,221,.4);border-radius:14px;padding:15px 17px;transition:opacity .4s,transform .4s}
  #learn.off{opacity:0;transform:translateY(14px);pointer-events:none}
  #learn .lk{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--bleu);margin-bottom:6px}
  #learn .lt{font-family:Georgia,serif;font-size:17px;margin-bottom:5px}
  #learn .ld{font-size:12.5px;line-height:1.5;color:var(--dim)}
  #toggle{position:fixed;right:22px;bottom:22px;z-index:25;cursor:pointer;border:1px solid rgba(143,192,221,.5);
          background:rgba(12,15,20,.8);color:var(--cream);border-radius:999px;padding:9px 15px;font-size:12px}

  /* zone de défilement invisible : c'est elle qui capte le scroll */
  #scroller{position:relative;z-index:5;pointer-events:none}
  @media (prefers-reduced-motion: reduce){ .hint i{animation:none} }
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="vig"></div>
  <div id="bar"></div>
  <nav><span>Profondeur</span><span class="b">SCROLL&nbsp;EN&nbsp;Z</span><span>Démo</span></nav>

  <div id="titles"></div>
  <div class="hint">entrer<i></i></div>

  <div id="learn">
    <div class="lk">🎓 Technique</div>
    <div class="lt" id="lt">Scroll en profondeur (axe Z)</div>
    <div class="ld" id="ld">Le scroll ne descend pas la page : il avance la caméra dans la scène 3D. On traverse des images empilées en profondeur — on entre dans la page.</div>
  </div>
  <div id="toggle">🎓 Apprentissage : ON</div>

  <div id="scroller"></div>

  <!-- ===== LIBS (vendored, hors-ligne) ===== -->
  <script>/*THREE*/__LIB_THREE__</script>
  <script>/*GSAP*/__LIB_GSAP__</script>
  <script>/*ScrollTrigger*/__LIB_ST__</script>
  <script>/*Lenis*/__LIB_LENIS__</script>

  <!-- ===== DÉMO : scroll en Z (z-stack / dolly caméra) ===== -->
  <script>
  (function(){
    "use strict";
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const IMAGES = __IMAGES__;
    const SCENES = [
      { kicker:'ATELIER · PERPÉTUELLE', title:'Perpétuelle', sub:"Entre dans la page : le scroll t'avance en profondeur." },
      { kicker:'I · LE GESTE',          title:"L'Atelier",   sub:"Chaque plan flotte dans l'espace ; tu le traverses." },
      { kicker:'II · LA MATIÈRE',       title:'Le Cuir',     sub:"La profondeur, pas le défilement : un voyage vers l'avant." },
      { kicker:'III · LA CONFIANCE',    title:'Certifiée',   sub:"Les plans s'approchent, grandissent, te dépassent." },
      { kicker:'IV · LE CYCLE',         title:'Revente',     sub:"Un empilement (z-stack) que la caméra franchit." },
      { kicker:'V · PETIT h',           title:'Renaissance', sub:"Rien ne se perd : on ressort par le fond." },
    ];
    const N = IMAGES.length;
    const S = { progress:0, velocity:0 };

    /* 1) Lenis : le scroll -> valeur 0..1 (sans bouger la page visible) */
    gsap.registerPlugin(ScrollTrigger);
    document.getElementById('scroller').style.height = ((N + 1.5) * 100) + 'vh';
    const lenis = new Lenis({ duration:1.2, smoothWheel:!reduce });
    lenis.on('scroll', (e)=>{ S.progress = e.progress||0; S.velocity = e.velocity||0; ScrollTrigger.update(); });
    gsap.ticker.add((t)=>lenis.raf(t*1000)); gsap.ticker.lagSmoothing(0);

    /* 2) Three.js : empilement de plans le long de l'axe Z + brouillard */
    const canvas = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
    const FOG = 0x0b0d10;
    renderer.setClearColor(FOG, 1);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(FOG, 0.020);
    const cam = new THREE.PerspectiveCamera(55, 1, 0.1, 300);

    const GAP = 7;             // espacement des plans en Z
    const COVER = 4;           // distance à laquelle un plan remplit l'écran
    const CAM_START = COVER + 1;          // 1er plan quasi net dès le départ
    const END_Z = -(N - 1) * GAP - 1.5;   // on franchit tout juste le dernier plan
    const TRAVEL = CAM_START - END_Z;

    const loader = new THREE.TextureLoader();
    const planes = IMAGES.map((src, i) => {
      const mat = new THREE.MeshBasicMaterial({ transparent:true, opacity:0, depthTest:false, depthWrite:false });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1,1), mat);
      mesh.position.z = -i * GAP;
      mesh.renderOrder = -i;   // les plans proches dessinés par-dessus
      mesh.userData.tex = null;
      loader.load(src, (tex)=>{ tex.minFilter = THREE.LinearFilter; tex.generateMipmaps = false;
        mat.map = tex; mat.needsUpdate = true; mesh.userData.tex = tex; fitPlane(mesh); });
      scene.add(mesh);
      return mesh;
    });

    function fitPlane(mesh){
      const tex = mesh.userData.tex; if(!tex || !tex.image) return;
      const W = window.innerWidth, H = window.innerHeight;
      const vh = 2 * Math.tan(THREE.MathUtils.degToRad(cam.fov)/2) * COVER;
      const vw = vh * (W/H);
      const ia = tex.image.width / tex.image.height;     // cover du cadre
      let w, h;
      if (ia > vw/vh){ h = vh; w = h * ia; } else { w = vw; h = w / ia; }
      mesh.scale.set(w, h, 1);
    }
    function resize(){
      const W = window.innerWidth, H = window.innerHeight;
      renderer.setSize(W, H, false);
      cam.aspect = W/H; cam.updateProjectionMatrix();
      planes.forEach(fitPlane);
    }
    window.addEventListener('resize', resize); resize();

    /* 3) Titres superposés (un par scène) */
    const titlesEl = document.getElementById('titles');
    const titleNodes = SCENES.map((s)=>{
      const d = document.createElement('div'); d.className='t';
      d.innerHTML = `<div class="kicker">${s.kicker}</div><div class="title serif">${s.title}</div><div class="sub">${s.sub}</div>`;
      titlesEl.appendChild(d); return d;
    });
    const lt = document.getElementById('lt'), ld = document.getElementById('ld');

    /* 4) Boucle de rendu : le scroll AVANCE la caméra dans l'axe Z */
    let camZ = CAM_START, last = performance.now();
    function render(now){
      const dt = Math.min(0.05, (now - last)/1000); last = now;
      const targetZ = CAM_START - S.progress * TRAVEL;
      camZ += (targetZ - camZ) * Math.min(1, dt * 5);   // lissage
      cam.position.z = camZ;

      let bestI = 0, bestO = -1;
      for (let i = 0; i < N; i++){
        const mesh = planes[i];
        const d = camZ - mesh.position.z;                // >0 : plan devant
        // opacité image : apparaît au loin, plein à mi-distance, s'efface avant qu'on le traverse
        let mo = 0;
        if (d > 0.5 && d < GAP*1.9) mo = Math.min((d-0.5)/1.6, (GAP*1.9 - d)/(GAP*1.1), 1);
        mesh.material.opacity = Math.max(0, mo);
        mesh.visible = mo > 0.002;
        // opacité du titre : net seulement quand le plan est dans la zone focale
        let to = 0;
        if (d > 1.4 && d < GAP*1.25) to = Math.min((d-1.4)/1.8, (GAP*1.25 - d)/(GAP*0.7), 1);
        const node = titleNodes[i];
        node.style.opacity = Math.max(0, to).toFixed(3);
        node.style.transform = 'translateZ(0) scale(' + (1 + (1-Math.min(1,d/COVER))*0.04) + ')';
        if (to > bestO){ bestO = to; bestI = i; }
      }
      renderer.render(scene, cam);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    /* 5) Barre de progression + panneau pédagogique */
    const bar = document.getElementById('bar');
    ScrollTrigger.create({ start:0, end:'max', onUpdate:(self)=>{ bar.style.width = (self.progress*100)+'%'; }});
    const learn = document.getElementById('learn'), toggle = document.getElementById('toggle');
    let on = true;
    toggle.addEventListener('click', ()=>{ on=!on; learn.classList.toggle('off',!on);
      toggle.textContent = '🎓 Apprentissage : ' + (on?'ON':'OFF'); });
  })();
  </script>
</body>
</html>
