body::after{ /* faint vignette */
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  box-shadow:inset 0 0 220px rgba(58,33,20,.20);
}

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:46px 18px;position:relative}
  .an{opacity:0;animation:rise .7s var(--ease) both;animation-delay:var(--d,0s)}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .invite{position:relative;z-index:2;width:min(820px,100%);text-align:center;
    background:linear-gradient(180deg,var(--paper),var(--paper2));
    border:1px solid rgba(179,132,44,.45);border-radius:22px;
    padding:clamp(38px,5vw,66px) clamp(26px,5.4vw,70px);
    box-shadow:0 40px 100px -46px rgba(58,33,20,.6),inset 0 0 0 1px rgba(255,255,255,.45)}
  .invite::after{content:"";position:absolute;inset:10px;border:1px solid rgba(179,132,44,.22);border-radius:14px;pointer-events:none}
  .cnr{position:absolute;width:26px;height:26px;border:2px solid var(--gold-b);opacity:.75;z-index:3}
  .cnr.tl{top:16px;left:16px;border-right:0;border-bottom:0;border-radius:8px 0 0 0}
  .cnr.tr{top:16px;right:16px;border-left:0;border-bottom:0;border-radius:0 8px 0 0}
  .cnr.bl{bottom:16px;left:16px;border-right:0;border-top:0;border-radius:0 0 0 8px}
  .cnr.br{bottom:16px;right:16px;border-left:0;border-top:0;border-radius:0 0 8px 0}
  .logo{width:clamp(96px,15vw,120px);height:auto;border-radius:24px;border:1px solid rgba(179,132,44,.55);box-shadow:0 24px 50px -26px rgba(58,33,20,.7);display:block;margin:0 auto}
  .float{animation:floaty 6s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .wordmark{font-family:var(--display);font-weight:700;font-size:clamp(40px,7.4vw,70px);letter-spacing:.12em;color:var(--brown);margin-top:24px;line-height:1;text-shadow:0 1px 0 rgba(255,251,240,.55)}
  .tl{font-family:var(--serif);font-style:italic;font-size:clamp(16px,2.6vw,21px);letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-top:10px}
  .rule{display:flex;align-items:center;gap:14px;justify-content:center;margin:22px auto;width:min(240px,70%);color:var(--gold)}
  .rule::before,.rule::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,#b3842c,transparent)}
  .rule i{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);flex:none}
  .csub{font-family:var(--serif);font-style:italic;font-size:clamp(17px,2.7vw,22px);color:var(--ink2);margin-top:4px}
  .cta{display:inline-flex;width:fit-content;margin:32px auto 6px;align-items:center;gap:10px;text-decoration:none;
    font-family:var(--sans);font-weight:700;font-size:clamp(15px,2.2vw,18px);letter-spacing:.03em;
    color:#fff;background:linear-gradient(135deg,#3a2013,#1f120a);border:1px solid var(--gold-b);border-radius:30px;
    padding:15px 36px;box-shadow:0 16px 32px -10px rgba(0,0,0,.5);transition:background .25s,transform .25s,color .25s}
  .cta:hover{transform:translateY(-2px);background:linear-gradient(135deg,var(--gold-s),var(--gold-b));color:#1f120a}
  .cta .ar{transition:transform .25s}
  .cta:hover .ar{transform:translateX(5px)}
  .meta{font-family:var(--sans);font-weight:600;font-size:clamp(10.5px,1.7vw,12px);letter-spacing:.18em;text-transform:uppercase;color:var(--ink2);line-height:2;margin-top:26px}
  .meta b{color:var(--ink)}
  .meta .g{color:var(--gold)}
  @media (prefers-reduced-motion:reduce){.an,.float{animation:none!important;opacity:1!important;transform:none!important}}
</style>
</head>
<body>
